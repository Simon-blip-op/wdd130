<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Get in touch with our rafting team for questions, bookings, or feedback.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Contact | White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>

<header>
    <img src="images/logo.jpg" alt="Rafting Logo">

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="trips.html">Trips</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>
</header>

<main>
     <h1>Blue Waterfull Rafting</h1>

    <section class="contact-info">
        
        <h2>Contact Information</h2>
        <p>123 Main River Street</p>
        <p>Kolob, California</p>
        <p>+1 999 999 9999</p>
        <p>info@whitewater.com</p>
    </section>

    <section class="contact-layout">

        <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d169979.27927577!2d28.011332981826435!3d-26.122360490284372!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sza!4v1775896027674!5m2!1sen!2sza" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <div class="contact-form">
            <h2>Send Us a Message</h2>

            <form>

                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <p>Message Purpose</p>

                <label>
                    <input type="radio" name="purpose" value="General Inquiry" required>
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" value="Reservation Question">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" value="Website Suggestion">
                    Website Suggestion
                </label>

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Type your message here" required></textarea>

                <label>
                    <input type="checkbox" name="subscribe">
                    Please subscribe for a monthly newsletter
                </label>

                <button type="submit">Send Message</button>

            </form>
        </div>

    </section>

    <!-- Employees -->
    <section class="employees">
        <h2>Meet Our Team</h2>

        <div class="employee-grid">
            <figure>
                <img src="images/employee1.jpg" alt="River Guide John">
                <figcaption>John Doe - River Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Safety Instructor Jane">
                <figcaption>Jane Smith - Safety Instructor</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Tour Manager Simon">
                <figcaption>Simon Banda - Tour Manager</figcaption>
            </figure>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 White Water Rafting Company</p>

    <div class="socialmedia">
        <a href="#"><img src="images/facebook.svg" alt="Facebook"></a>
        <a href="#"><img src="images/twitter.svg" alt="Twitter"></a>
        <a href="#"><img src="images/instagram.svg" alt="Instagram"></a>
    </div>
</footer>

</body>
</html>
